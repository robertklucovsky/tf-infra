name: Build CNPG operand image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (must start with 17, never latest) — no default, always specify explicitly'
        required: true

env:
  IMAGE: ghcr.io/robertklucovsky/cnpg-postgresql

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME#cnpg-image-}"
          fi
          case "$TAG" in
            17*) : ;;
            *) echo "Tag must start with 17: $TAG"; exit 1 ;;
          esac
          [ "$TAG" = "latest" ] && { echo "tag must not be latest"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Make the built commit visible in the log — this build reflects
          # whatever is on the dispatched ref, which silently diverges from a
          # local checkout if commits weren't pushed before dispatching.
          echo "Building tag $TAG from commit ${GITHUB_SHA}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: images/cnpg
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
